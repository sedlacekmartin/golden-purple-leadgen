<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Purple — Lead-gen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .spin { animation: spin 0.8s linear infinite; }
    .slide-up { animation: slideUp 0.18s ease; }
    details.draft > summary { list-style: none; }
    details.draft > summary::-webkit-details-marker { display: none; }
    details.draft > summary .chev { transition: transform 0.15s; }
    details.draft[open] > summary .chev { transform: rotate(90deg); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

<header class="bg-purple-900 shadow-lg sticky top-0 z-20">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <span class="text-amber-400 font-bold text-xl">◆</span>
      <span class="text-white font-bold text-lg tracking-tight">Golden Purple</span>
      <span class="text-purple-300 text-sm hidden sm:inline">/ Lead-gen</span>
    </div>
    <button onclick="loadLeads()" title="Obnovit"
      class="text-purple-300 hover:text-white text-xl px-1 transition-colors">↻</button>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6">

  <!-- Stats -->
  <div id="stats" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>

  <div class="lg:grid lg:grid-cols-[300px_1fr] lg:gap-6 lg:items-start">

    <!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
    <aside class="space-y-4 mb-6 lg:mb-0 lg:sticky lg:top-20">

      <!-- Search -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Nové hledání</h2>

        <label class="text-xs text-gray-400 font-medium mb-1 block">Lokalita</label>
        <input id="inp-location" type="text" placeholder="např. Třebíč" value="Třebíč"
          class="w-full bg-slate-50 rounded-lg px-3 py-2.5 text-sm border-0 focus:outline-none focus:ring-2 focus:ring-purple-400 mb-3">

        <div class="flex items-center justify-between mb-1">
          <label class="text-xs text-gray-400 font-medium">Kategorie <span id="cat-count" class="text-purple-500 font-bold"></span></label>
          <button onclick="toggleAllCategories()" id="btn-all-cats"
            class="text-xs text-purple-500 hover:text-purple-700 font-medium transition-colors">Vše</button>
        </div>
        <div id="cat-chips" class="flex flex-wrap gap-1.5 max-h-36 overflow-y-auto pr-1 mb-3"></div>

        <label class="text-xs text-gray-400 font-medium mb-1 block">Počet výsledků (max 50)</label>
        <input id="inp-limit" type="number" placeholder="10" value="10" min="1" max="50"
          class="w-full bg-slate-50 rounded-lg px-3 py-2.5 text-sm border-0 focus:outline-none focus:ring-2 focus:ring-purple-400 mb-4">

        <button id="search-btn" onclick="runSearch()"
          class="w-full bg-purple-700 hover:bg-purple-800 disabled:opacity-60 text-white px-5 py-2.5 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2 justify-center">
          <span id="search-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin"></span>
          <span id="search-label">🔍 Hledat leady</span>
        </button>
      </div>

      <!-- Filters -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Filtry</h2>
          <button onclick="clearFilters()" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">Zrušit</button>
        </div>

        <div class="flex items-center gap-2 mb-3">
          <label class="text-xs text-gray-400 font-medium whitespace-nowrap flex-1">Min. skóre</label>
          <input id="f-score" type="number" value="0" min="0" max="100" oninput="resetPage();render()"
            class="w-16 bg-slate-50 rounded-lg px-2 py-1.5 text-sm border-0 focus:outline-none focus:ring-2 focus:ring-purple-400 text-center">
        </div>

        <div class="flex flex-col gap-2 mb-3">
          <label class="flex items-center gap-1.5 cursor-pointer select-none">
            <input id="f-email" type="checkbox" onchange="resetPage();render()" class="accent-purple-600 w-3.5 h-3.5">
            <span class="text-xs text-gray-500">Jen s e-mailem</span>
          </label>
          <label class="flex items-center gap-1.5 cursor-pointer select-none">
            <input id="f-draft" type="checkbox" onchange="resetPage();render()" class="accent-purple-600 w-3.5 h-3.5">
            <span class="text-xs text-gray-500">Jen s draftem</span>
          </label>
        </div>

        <div id="f-reasons" class="flex flex-wrap gap-1.5 mb-2"></div>
        <div id="f-cats" class="flex flex-wrap gap-1.5"></div>
      </div>

      <!-- Scoring legend -->
      <details class="bg-white rounded-2xl shadow-sm border border-gray-100">
        <summary class="px-4 py-3 text-xs font-semibold text-gray-400 uppercase tracking-widest cursor-pointer select-none hover:text-gray-600 transition-colors">
          Jak funguje skórování?
        </summary>
        <div class="px-4 pb-4 space-y-2 text-xs">
          <div class="flex justify-between gap-2"><span class="text-gray-600">Nemá web</span><span class="bg-red-100 text-red-700 font-bold px-2 py-0.5 rounded-full shrink-0">+40</span></div>
          <div class="flex justify-between gap-2"><span class="text-gray-600">Málo recenzí (&lt;20)</span><span class="bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full shrink-0">+25</span></div>
          <div class="flex justify-between gap-2"><span class="text-gray-600">Nízké hodnocení (&lt;3.5★)</span><span class="bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full shrink-0">+20</span></div>
          <div class="flex justify-between gap-2"><span class="text-gray-600">Podprůměr recenzí (20–50)</span><span class="bg-gray-100 text-gray-600 font-bold px-2 py-0.5 rounded-full shrink-0">+10</span></div>
          <div class="flex justify-between gap-2"><span class="text-gray-600">Dobré hodnocení (&gt;4.3★)</span><span class="bg-green-100 text-green-700 font-bold px-2 py-0.5 rounded-full shrink-0">+5</span></div>
          <p class="text-gray-300 pt-1">Skóre &gt;60 červené · 35–60 oranžové · méně zelené</p>
        </div>
      </details>

    </aside>

    <!-- ── MAIN ────────────────────────────────────────────────────────────── -->
    <section>

      <!-- Tabs -->
      <div class="flex gap-1 bg-gray-200/70 p-1 rounded-xl w-fit mb-4">
        <button id="tab-pending" onclick="switchTab('pending')"
          class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white text-purple-700 shadow-sm">
          Ke schválení&thinsp;<span id="cnt-pending" class="text-xs bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded-full font-bold"></span>
        </button>
        <button id="tab-approved" onclick="switchTab('approved')"
          class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700">
          Schválené&thinsp;<span id="cnt-approved" class="text-xs bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded-full font-bold"></span>
        </button>
      </div>

      <!-- Cards -->
      <div id="cards" class="space-y-3"></div>

      <!-- Pagination -->
      <div id="pagination" class="hidden items-center justify-between py-6">
        <button id="pg-prev" onclick="changePage(-1)"
          class="px-4 py-2 rounded-xl border border-gray-200 bg-white text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-30 transition-colors">← Předchozí</button>
        <div class="flex items-center gap-3">
          <span id="pg-info" class="text-xs text-gray-400"></span>
          <select id="pg-size" onchange="changePageSize(this.value)"
            class="bg-white rounded-lg px-2 py-1.5 text-xs border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-400 text-gray-500">
            <option value="10" selected>10 / str.</option>
            <option value="25">25 / str.</option>
            <option value="50">50 / str.</option>
            <option value="100">100 / str.</option>
          </select>
        </div>
        <button id="pg-next" onclick="changePage(1)"
          class="px-4 py-2 rounded-xl border border-gray-200 bg-white text-sm text-gray-500 hover:bg-gray-50 disabled:opacity-30 transition-colors">Další →</button>
      </div>

    </section>
  </div>
</main>

<!-- Mockup modal -->
<div id="mockup-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onclick="closeMockup(event)">
  <div class="relative max-w-6xl w-full">
    <button onclick="closeMockup()" class="absolute -top-10 right-0 text-white/70 hover:text-white text-sm">✕ Zavřít</button>
    <img id="mockup-img" src="" alt="Návrh webu" class="w-full rounded-xl shadow-2xl">
    <div class="flex justify-end mt-3 gap-2">
      <a id="mockup-dl" href="" download class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-lg transition-colors">⬇ Stáhnout</a>
      <button id="mockup-regen" onclick="regenMockup()" class="bg-purple-600 hover:bg-purple-700 text-white text-sm px-4 py-2 rounded-lg transition-colors">↻ Regenerovat</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-wrap" class="fixed bottom-6 inset-x-0 flex justify-center pointer-events-none z-50">
  <div id="toast" class="hidden text-white text-sm px-5 py-2.5 rounded-full shadow-xl"></div>
</div>

<script>
let activeTab = 'pending';
let leads = { pending: [], approved: [] };

// ── Data ─────────────────────────────────────────────────────────────────────

async function loadLeads() {
  try {
    const [p, a] = await Promise.all([
      fetch('/api/leads?status=pending').then(r => r.json()),
      fetch('/api/leads?status=approved').then(r => r.json()),
    ]);
    leads.pending  = p.leads || [];
    leads.approved = a.leads || [];
    updateCounts();
    renderStats();
    renderFilterUI();
    render();
  } catch { toast('Chyba při načítání', true); }
}

async function runSearch() {
  const btn      = document.getElementById('search-btn');
  const spinner  = document.getElementById('search-spinner');
  const label    = document.getElementById('search-label');
  btn.disabled   = true;
  spinner.classList.remove('hidden');
  label.textContent = 'Hledám…';
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        location:   document.getElementById('inp-location').value.trim() || 'Třebíč',
        categories: selectedCats.size ? [...selectedCats] : ['restaurace'],
        limit:      parseInt(document.getElementById('inp-limit').value) || 10,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Chyba serveru');
    toast(`Nalezeno ${data.leads?.length ?? 0} leadů`);
    await loadLeads();
  } catch(e) {
    toast(e.message || 'Chyba při vyhledávání', true);
  } finally {
    btn.disabled = false;
    spinner.classList.add('hidden');
    label.textContent = '🔍 Hledat leady';
  }
}

async function patchLead(id, data) {
  try {
    await fetch('/api/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, ...data }),
    });
  } catch { toast('Chyba při ukládání', true); }
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function approve(id) {
  const ta = document.getElementById(`ta-${id}`);
  const extra = (ta && !ta.classList.contains('hidden')) ? { email_draft: ta.value } : {};
  await patchLead(id, { status: 'approved', ...extra });
  toast('Lead schválen ✓');
  await loadLeads();
}

async function skip(id) {
  await patchLead(id, { status: 'skipped' });
  leads.pending = leads.pending.filter(l => l.id !== id);
  updateCounts();
  renderStats();
  render();
  toast('Přeskočeno');
}

async function revert(id) {
  await patchLead(id, { status: 'pending' });
  toast('Vráceno ke schválení');
  await loadLeads();
}

// ── Mockup modal ──────────────────────────────────────────────────────────────

let currentMockupId = null;

async function showMockup(id, btn) {
  currentMockupId = id;
  const orig = btn.textContent;
  btn.textContent = 'Generuji…';
  btn.disabled = true;
  try {
    const res  = await fetch(`/api/mockup?id=${id}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Chyba');
    document.getElementById('mockup-img').src = data.url;
    document.getElementById('mockup-dl').href = data.url;
    document.getElementById('mockup-modal').classList.remove('hidden');
  } catch(e) {
    toast(e.message, true);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

async function regenMockup() {
  if (!currentMockupId) return;
  const btn = document.getElementById('mockup-regen');
  btn.textContent = 'Generuji…';
  btn.disabled = true;
  try {
    const res  = await fetch(`/api/mockup?id=${currentMockupId}&regen=1`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Chyba');
    document.getElementById('mockup-img').src = data.url;
    document.getElementById('mockup-dl').href = data.url;
  } catch(e) {
    toast(e.message, true);
  } finally {
    btn.textContent = '↻ Regenerovat';
    btn.disabled = false;
  }
}

function closeMockup(e) {
  if (e && e.target !== document.getElementById('mockup-modal')) return;
  document.getElementById('mockup-modal').classList.add('hidden');
  document.getElementById('mockup-img').src = '';
}

function copyDraft(id) {
  const lead = [...leads.pending, ...leads.approved].find(l => l.id === id);
  if (!lead?.email_draft) return;
  navigator.clipboard.writeText(lead.email_draft).then(() => toast('Draft zkopírován 📋'));
}

function toggleEdit(id) {
  const view = document.getElementById(`view-${id}`);
  const ta   = document.getElementById(`ta-${id}`);
  const btn  = document.getElementById(`edit-btn-${id}`);
  const editing = !ta.classList.contains('hidden');
  if (editing) {
    view.textContent = ta.value;
    view.classList.remove('hidden');
    ta.classList.add('hidden');
    btn.textContent = 'Upravit';
    patchLead(id, { email_draft: ta.value });
  } else {
    view.classList.add('hidden');
    ta.classList.remove('hidden');
    btn.textContent = 'Uložit';
    ta.focus();
  }
}

// ── Stats ─────────────────────────────────────────────────────────────────────

function renderStats() {
  const all = [...leads.pending, ...leads.approved];
  const withEmail = all.filter(l => l.email).length;
  const avgScore = all.length ? Math.round(all.reduce((s, l) => s + (l.score || 0), 0) / all.length) : 0;
  const stat = (label, value, accent = '') => `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 px-4 py-3">
      <div class="text-2xl font-bold ${accent || 'text-gray-800'}">${value}</div>
      <div class="text-xs text-gray-400 mt-0.5">${label}</div>
    </div>`;
  document.getElementById('stats').innerHTML =
    stat('Leadů celkem', all.length) +
    stat('Ke schválení', leads.pending.length, 'text-purple-700') +
    stat('Schváleno', leads.approved.length, 'text-green-600') +
    stat('S e-mailem', all.length ? Math.round(withEmail / all.length * 100) + ' %' : '—', 'text-amber-500');
}

// ── UI helpers ────────────────────────────────────────────────────────────────

function switchTab(t) {
  activeTab = t;
  currentPage = 1;
  ['pending', 'approved'].forEach(id => {
    const btn = document.getElementById(`tab-${id}`);
    btn.className = id === t
      ? 'px-4 py-1.5 rounded-lg text-sm font-medium transition-all bg-white text-purple-700 shadow-sm'
      : 'px-4 py-1.5 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-700';
  });
  renderFilterUI();
  render();
}

function updateCounts() {
  document.getElementById('cnt-pending').textContent  = leads.pending.length  || '';
  document.getElementById('cnt-approved').textContent = leads.approved.length || '';
}

// ── Filters ───────────────────────────────────────────────────────────────────

const REASON_SHORT = {
  'Nemá web': 'Nemá web',
  'Málo recenzí — slabá online přítomnost': 'Málo recenzí',
  'Podprůměrný počet recenzí': 'Průměr. recenze',
  'Nízké Google hodnocení': 'Nízké hodnocení',
  'Dobré hodnocení = reagující firma': 'Dobré hodnocení',
};

let activeReasons = new Set();
let activeCatFilter = new Set();

function getFiltered() {
  const minScore = parseInt(document.getElementById('f-score')?.value) || 0;
  const onlyDraft = document.getElementById('f-draft')?.checked;
  const onlyEmail = document.getElementById('f-email')?.checked;
  return [...leads[activeTab]]
    .filter(l => l.score >= minScore)
    .filter(l => !activeReasons.size || l.reasons?.some(r => activeReasons.has(r)))
    .filter(l => !activeCatFilter.size || activeCatFilter.has(l.category))
    .filter(l => !onlyDraft || !!l.email_draft)
    .filter(l => !onlyEmail || !!l.email)
    .sort((a, b) => b.score - a.score);
}

function renderFilterUI() {
  const allReasons = [...new Set(leads[activeTab].flatMap(l => l.reasons || []))];
  document.getElementById('f-reasons').innerHTML = allReasons.map(r => {
    const active = activeReasons.has(r);
    return `<button onclick="toggleReason('${r.replace(/'/g,"&#39;")}')"
      class="text-xs px-2.5 py-1 rounded-full border transition-all font-medium
        ${active ? 'bg-purple-700 text-white border-purple-700' : 'bg-white text-gray-500 border-gray-200 hover:border-purple-300 hover:text-purple-600'}">
      ${esc(REASON_SHORT[r] || r)}
    </button>`;
  }).join('');

  const allCatsInLeads = [...new Set(leads[activeTab].map(l => l.category).filter(Boolean))];
  document.getElementById('f-cats').innerHTML = allCatsInLeads.length < 2 ? '' : allCatsInLeads.map(c => {
    const active = activeCatFilter.has(c);
    return `<button onclick="toggleCatFilter('${c.replace(/'/g,"&#39;")}')"
      class="text-xs px-2.5 py-1 rounded-full border transition-all
        ${active ? 'bg-gray-700 text-white border-gray-700' : 'bg-white text-gray-400 border-gray-200 hover:border-gray-400 hover:text-gray-600'}">
      ${esc(c)}
    </button>`;
  }).join('');
}

function toggleReason(r) { activeReasons.has(r) ? activeReasons.delete(r) : activeReasons.add(r); resetPage(); render(); renderFilterUI(); }
function toggleCatFilter(c) { activeCatFilter.has(c) ? activeCatFilter.delete(c) : activeCatFilter.add(c); resetPage(); render(); }
function clearFilters() {
  activeReasons.clear(); activeCatFilter.clear();
  document.getElementById('f-score').value = 0;
  document.getElementById('f-draft').checked = false;
  document.getElementById('f-email').checked = false;
  resetPage(); render(); renderFilterUI();
}

function scoreBadge(score) {
  if (score >= 60) return 'bg-red-100 text-red-700';
  if (score >= 35) return 'bg-amber-100 text-amber-700';
  return 'bg-green-100 text-green-700';
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Pagination ────────────────────────────────────────────────────────────────

let PAGE_SIZE = 10;
let currentPage = 1;

function changePageSize(val) {
  PAGE_SIZE = parseInt(val);
  resetPage();
  render();
}

function resetPage() { currentPage = 1; }

function changePage(dir) {
  const filtered = getFiltered();
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(total, currentPage + dir));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.classList.add('hidden'); el.classList.remove('flex'); return; }
  el.classList.remove('hidden');
  el.classList.add('flex');
  document.getElementById('pg-info').textContent = `Strana ${currentPage} z ${pages} (${total} leadů)`;
  document.getElementById('pg-prev').disabled = currentPage === 1;
  document.getElementById('pg-next').disabled = currentPage === pages;
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const el   = document.getElementById('cards');
  const filtered = getFiltered();
  const start = (currentPage - 1) * PAGE_SIZE;
  const list  = filtered.slice(start, start + PAGE_SIZE);

  renderPagination(filtered.length);

  if (!filtered.length) {
    el.innerHTML = `<div class="text-center py-16 text-gray-400 text-sm bg-white rounded-2xl border border-gray-100">
      <div class="text-4xl mb-2">${activeTab === 'pending' ? '🔍' : '✅'}</div>
      ${activeTab === 'pending'
        ? 'Zadej parametry vlevo a klikni Hledat leady.'
        : 'Žádné schválené leady.'}
    </div>`;
    return;
  }

  el.innerHTML = list.map(lead => {
    const isPending = lead.status === 'pending';
    return `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 slide-up" id="card-${lead.id}">

      <div class="flex items-start justify-between gap-3 mb-1.5">
        <div class="min-w-0">
          <div class="font-semibold text-gray-800 truncate">${esc(lead.company)}</div>
          <div class="text-xs text-gray-400 mt-0.5">${[lead.location, lead.category].filter(Boolean).map(esc).join(' · ')}</div>
        </div>
        <span class="shrink-0 text-xs font-bold px-2.5 py-1 rounded-full ${scoreBadge(lead.score)}">${lead.score} b.</span>
      </div>

      <div class="flex flex-wrap gap-1.5 mb-2">
        ${(lead.reasons || []).map(r => `<span class="text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded-full">${esc(REASON_SHORT[r] || r)}</span>`).join('')}
        ${lead.legal_form ? `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${esc(lead.legal_form)}</span>` : ''}
        ${lead.founded    ? `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">od ${esc(lead.founded.slice(0,4))}</span>` : ''}
        ${lead.employees  ? `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">👥 ${esc(lead.employees)}</span>` : ''}
        ${lead.ico        ? `<span class="text-xs bg-slate-100 text-slate-400 px-2 py-0.5 rounded-full">IČO ${esc(lead.ico)}</span>` : ''}
      </div>

      <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-400 mb-3">
        ${lead.email   ? `<a href="mailto:${esc(lead.email)}" class="text-purple-600 font-medium hover:underline">✉️ ${esc(lead.email)}</a>`
                       : `<span class="text-gray-300">✉️ E-mail nenalezen</span>`}
        ${lead.phone   ? `<span>📞 ${esc(lead.phone)}</span>` : ''}
        ${lead.website ? `<a href="${esc(lead.website)}" target="_blank" class="text-purple-500 hover:underline">🌐 ${esc(lead.website).replace(/^https?:\/\/(www\.)?/,'').slice(0,40)}</a>`
                       : `<span>🌐 Nemá web</span>`}
      </div>

      <details class="draft bg-slate-50 rounded-xl mb-3" ${isPending ? 'open' : ''}>
        <summary class="px-3 py-2 cursor-pointer select-none flex items-center gap-2">
          <span class="chev text-gray-400 text-xs">▶</span>
          <span class="text-xs font-semibold text-gray-400 uppercase tracking-wide flex-1">Draft e-mailu</span>
          ${isPending ? `<button id="edit-btn-${lead.id}" onclick="event.preventDefault();event.stopPropagation();toggleEdit('${lead.id}')"
            class="text-xs text-purple-500 hover:text-purple-700 font-medium">Upravit</button>` : ''}
        </summary>
        <div class="px-3 pb-3">
          <div id="view-${lead.id}" class="text-sm text-gray-600 whitespace-pre-line leading-relaxed">${esc(lead.email_draft)}</div>
          <textarea id="ta-${lead.id}" class="hidden w-full text-sm text-gray-700 bg-white border border-purple-200 rounded-lg p-2 mt-1 resize-none focus:outline-none focus:ring-2 focus:ring-purple-400 leading-relaxed" rows="7">${esc(lead.email_draft)}</textarea>
        </div>
      </details>

      <div class="flex gap-2 flex-wrap">
        ${isPending ? `
          <button onclick="approve('${lead.id}')"
            class="flex-1 bg-purple-700 hover:bg-purple-800 text-white py-2 rounded-xl text-sm font-semibold transition-colors">
            ✓ Schválit
          </button>
          <button onclick="skip('${lead.id}')"
            class="flex-1 border border-gray-200 hover:bg-gray-50 text-gray-500 py-2 rounded-xl text-sm font-medium transition-colors">
            Přeskočit
          </button>
        ` : `
          <span class="flex-1 flex items-center text-sm text-green-600 font-medium">✅ Schváleno</span>
          <button onclick="copyDraft('${lead.id}')"
            class="border border-gray-200 hover:bg-gray-50 text-gray-500 px-4 py-2 rounded-xl text-sm font-medium transition-colors">
            📋 Kopírovat
          </button>
          <button onclick="revert('${lead.id}')"
            class="border border-gray-200 hover:bg-red-50 hover:text-red-400 text-gray-400 px-3 py-2 rounded-xl text-sm transition-colors">
            Vrátit
          </button>
        `}
        <button onclick="showMockup('${lead.id}', this)"
          class="border border-purple-200 hover:bg-purple-50 text-purple-600 px-3 py-2 rounded-xl text-sm font-medium transition-colors whitespace-nowrap">
          🎨 Návrh webu
        </button>
      </div>
    </div>`;
  }).join('');
}

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `${isError ? 'bg-red-800' : 'bg-gray-900'} text-white text-sm px-5 py-2.5 rounded-full shadow-xl`;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 2800);
}

// ── Categories ───────────────────────────────────────────────────────────────

const ALL_CATS = [
  // Lokální služby
  'restaurace','kavárna','pizzerie','autoservis','kadeřnictví',
  'kosmetický salon','zubař','účetní','pekárna','řeznictví',
  'květinářství','realitní kancelář','fitness','právník',
  // B2B — střední firmy
  'stavební firma','elektroinstalace','instalatérství',
  'truhlářství','klempířství','strojírenství','svářečství',
  'dopravní firma','logistika a skladování','zemědělská firma',
  'průmyslové čištění','bezpečnostní agentura','tiskárna',
  'CNC obrábění','výroba plastů','projektová kancelář',
  'architektonická kancelář','poradenská firma','servis strojů',
];
let selectedCats = new Set(['restaurace']);

function renderChips() {
  const el = document.getElementById('cat-chips');
  el.innerHTML = ALL_CATS.map(cat => {
    const active = selectedCats.has(cat);
    return `<button onclick="toggleCat('${cat}')"
      class="text-xs px-2.5 py-1 rounded-full border transition-all font-medium
        ${active ? 'bg-purple-700 text-white border-purple-700' : 'bg-white text-gray-500 border-gray-200 hover:border-purple-300 hover:text-purple-600'}">
      ${cat}
    </button>`;
  }).join('');
  const allSelected = ALL_CATS.every(c => selectedCats.has(c));
  document.getElementById('btn-all-cats').textContent = allSelected ? 'Zrušit vše' : 'Vše';
  document.getElementById('cat-count').textContent = selectedCats.size ? `(${selectedCats.size})` : '';
}

function toggleCat(cat) {
  if (selectedCats.has(cat)) { selectedCats.delete(cat); } else { selectedCats.add(cat); }
  renderChips();
}

function toggleAllCategories() {
  if (ALL_CATS.every(c => selectedCats.has(c))) { selectedCats.clear(); } else { ALL_CATS.forEach(c => selectedCats.add(c)); }
  renderChips();
}

renderChips();

// ── Init ──────────────────────────────────────────────────────────────────────
loadLeads();
</script>
